<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="100%">
  <defs>
    <style>
      @keyframes snakeMove {
        0% { transform: translateX(0) translateY(0); }
        20% { transform: translateX(0) translateY(10px); }
        40% { transform: translateX(10px) translateY(10px); }
        60% { transform: translateX(10px) translateY(0); }
        80% { transform: translateX(20px) translateY(0); }
        100% { transform: translateX(0) translateY(0); }
      }
      
      @keyframes eat {
        0% { opacity: 0; transform: scale(0.8); }
        50% { opacity: 1; transform: scale(1.2); }
        100% { opacity: 0; transform: scale(0.8); }
      }
      
      @keyframes pulse {
        0%, 100% { opacity: 0.7; }
        50% { opacity: 1; }
      }
      
      .contribution-cell {
        rx: 2px;
        ry: 2px;
      }
      
      .snake-body {
        animation: snakeMove 3s ease-in-out infinite;
      }
      
      .eating-effect {
        animation: eat 1.5s ease-in-out infinite;
      }
      
      .pulse-effect {
        animation: pulse 2s ease-in-out infinite;
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="#0d1117" rx="10" ry="10"/>
  
  <!-- Title -->
  <text x="400" y="30" font-family="Arial, sans-serif" font-size="20" fill="#58a6ff" text-anchor="middle" font-weight="bold">
    Contribution Snake Animation
  </text>
  
  <!-- Weekday Labels -->
  <g font-family="Arial, sans-serif" font-size="10" fill="#8b949e">
